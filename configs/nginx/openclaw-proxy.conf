# OpenClaw Reverse Proxy Configuration
# Only needed if exposing the gateway externally (not recommended for most setups)
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

upstream openclaw_gateway {
    server 127.0.0.1:3578;
    keepalive 32;
}

upstream n8n_backend {
    server 127.0.0.1:5678;
    keepalive 16;
}

# NOTE: This directive must be placed in the http {} block of /etc/nginx/nginx.conf
limit_req_zone $binary_remote_addr zone=openclaw_limit:10m rate=10r/s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name openclaw.yourdomain.com n8n.yourdomain.com;
    return 301 https://$host$request_uri;
}

# OpenClaw Gateway (if needed externally — prefer loopback-only)
server {
    listen 443 ssl http2;
    server_name openclaw.yourdomain.com;

    # SSL — managed by Certbot (uncomment after running certbot)
    # ssl_certificate /etc/letsencrypt/live/openclaw.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/openclaw.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'" always;

    location / {
        limit_req zone=openclaw_limit burst=20 nodelay;

        proxy_pass http://openclaw_gateway;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://openclaw_gateway/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # Deny access to sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }
}

# n8n Dashboard (optional — for admin access)
server {
    listen 443 ssl http2;
    server_name n8n.yourdomain.com;

    # SSL — managed by Certbot
    # ssl_certificate /etc/letsencrypt/live/n8n.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/n8n.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # IP allowlist — restrict to your office/VPN
    # allow 203.0.113.0/24;
    # deny all;

    location / {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
